<!DOCTYPE html>
<html>
<head>
  <title>GovLingual - Translation Service</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; }
    .translator { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
    .panel { padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
    textarea { width: 100%; height: 150px; padding: 10px; font-size: 16px; }
    select, button { padding: 10px; font-size: 16px; }
    button { background: #005ea2; color: white; border: none; cursor: pointer; margin-top: 10px; }
    .lang-selector { margin: 10px 0; }
    .quick-phrases { margin-top: 20px; }
    .phrase-btn { 
      display: inline-block; 
      padding: 8px 15px; 
      margin: 5px; 
      background: #e3f2fd; 
      border: 1px solid #005ea2;
      border-radius: 5px;
      cursor: pointer;
    }
    .phrase-btn:hover { background: #bbdefb; }
  </style>
</head>
<body>
  <h1>🌍 GovLingual</h1>
  <p>Real-time translation for government services</p>
  
  <div class="lang-selector">
    <label>Target Language:</label>
    <select id="targetLang">
      <option value="es">Spanish (Español)</option>
      <option value="zh">Chinese (中文)</option>
      <option value="ar">Arabic (العربية)</option>
    </select>
  </div>
  
  <div class="translator">
    <div class="panel">
      <h3>English</h3>
      <textarea id="sourceText" placeholder="Enter text to translate..."></textarea>
      <button onclick="translate()">Translate →</button>
    </div>
    
    <div class="panel">
      <h3 id="targetLangName">Spanish</h3>
      <textarea id="translatedText" readonly></textarea>
    </div>
  </div>
  
  <div class="quick-phrases">
    <h3>Quick Phrases</h3>
    <div class="phrase-btn" onclick="quickTranslate('Hello')">Hello</div>
    <div class="phrase-btn" onclick="quickTranslate('Welcome')">Welcome</div>
    <div class="phrase-btn" onclick="quickTranslate('Apply')">Apply</div>
    <div class="phrase-btn" onclick="quickTranslate('Submit')">Submit</div>
    <div class="phrase-btn" onclick="quickTranslate('Thank you')">Thank you</div>
    <div class="phrase-btn" onclick="quickTranslate('Please wait')">Please wait</div>
  </div>
  
  <div id="history" style="margin-top: 30px;"></div>
  
  <script>
    const langNames = {
      es: 'Spanish (Español)',
      zh: 'Chinese (中文)',
      ar: 'Arabic (العربية)'
    };
    
    document.getElementById('targetLang').onchange = function() {
      document.getElementById('targetLangName').textContent = langNames[this.value];
    };
    
    async function translate() {
      const text = document.getElementById('sourceText').value.trim();
      if (!text) return;
      
      const targetLang = document.getElementById('targetLang').value;
      
      const res = await fetch('http://localhost:3008/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, targetLang })
      });
      
      const data = await res.json();
      document.getElementById('translatedText').value = data.translated;
      
      addToHistory(data.original, data.translated, targetLang);
    }
    
    async function quickTranslate(phrase) {
      document.getElementById('sourceText').value = phrase;
      await translate();
    }
    
    function addToHistory(original, translated, lang) {
      const div = document.getElementById('history');
      const item = document.createElement('div');
      item.style.cssText = 'padding: 10px; margin: 5px 0; background: #f5f5f5; border-left: 4px solid #005ea2;';
      item.innerHTML = `<strong>${original}</strong> → ${translated} <small>(${langNames[lang]})</small>`;
      div.insertBefore(item, div.firstChild);
    }
  </script>
</body>
</html>
